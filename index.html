<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian — API Design Intelligence</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --surface2: #f1f0ec; --border: #e2e0da;
    --accent: #2563eb; --accent-light: #eff6ff;
    --text: #1a1917; --text2: #6b6860; --text3: #9c9a96;
    --warn-bg: #fffbeb; --warn-border: #fcd34d; --warn-text: #92400e;
    --danger-bg: #fef2f2; --danger-border: #fca5a5; --danger-text: #991b1b;
    --success-bg: #f0fdf4; --success-text: #166534;
    --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 28px; display: flex; align-items: center; gap: 14px; height: 56px; flex-shrink: 0; }
  .logo-wrap { display: flex; align-items: center; gap: 10px; }
  .logo { width: 30px; height: 30px; background: var(--text); border-radius: 7px; display: flex; align-items: center; justify-content: center; color: white; font-size: 15px; font-weight: 800; font-family: var(--sans); flex-shrink: 0; }
  .logo-text { font-size: 1rem; font-weight: 800; letter-spacing: -0.02em; }
  .logo-sub { font-size: 0.6rem; color: var(--text3); font-weight: 400; margin-top: 1px; }
  .hdivider { width: 1px; height: 22px; background: var(--border); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #94a3b8; flex-shrink: 0; transition: background 0.3s; }
  .status-label { font-size: 0.67rem; color: var(--text2); }
  .spacer { flex: 1; }
  .badge { font-family: var(--mono); font-size: 0.57rem; color: var(--accent); border: 1px solid var(--accent); border-radius: 4px; padding: 2px 8px; letter-spacing: 0.05em; }

  main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px 28px 20px; flex: 1; }

  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; overflow: hidden; }
  .panel-head { padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .panel-head h2 { font-size: 0.64rem; font-weight: 700; color: var(--text2); letter-spacing: 0.08em; text-transform: uppercase; }
  .panel-head .cnt { margin-left: auto; font-family: var(--mono); font-size: 0.6rem; color: var(--text3); }

  textarea { flex: 1; border: none; outline: none; padding: 14px 16px; font-family: var(--mono); font-size: 0.76rem; line-height: 1.75; color: var(--text); background: var(--surface); resize: none; width: 100%; min-height: 460px; }
  textarea::placeholder { color: var(--text3); }

  .action-bar { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--surface2); display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .btn { padding: 7px 16px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); font-family: var(--sans); font-size: 0.75rem; font-weight: 600; cursor: pointer; color: var(--text); transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--bg); }
  .btn.primary { background: var(--text); color: white; border-color: var(--text); }
  .btn.primary:hover { opacity: 0.86; }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .hint { font-size: 0.63rem; color: var(--text3); font-family: var(--mono); margin-left: auto; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--surface2); flex-shrink: 0; }
  .tab { padding: 9px 13px; font-size: 0.67rem; font-weight: 700; cursor: pointer; color: var(--text2); border-bottom: 2px solid transparent; border-top: none; border-left: none; border-right: none; background: none; white-space: nowrap; font-family: var(--sans); transition: color 0.15s; }
  .tab.on { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.on) { color: var(--text); }

  .out { flex: 1; overflow-y: auto; padding: 14px 16px; font-size: 0.78rem; line-height: 1.6; display: none; min-height: 460px; }
  .out.on { display: block; }
  .out::-webkit-scrollbar { width: 4px; }
  .out::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 10px; color: var(--text3); text-align: center; font-size: 0.78rem; padding: 20px; }
  .empty .icon { font-size: 1.8rem; opacity: 0.3; }

  .spin-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; gap: 16px; }
  .spin { width: 26px; height: 26px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .prog-label { font-size: 0.72rem; color: var(--text2); text-align: center; }
  .prog-bar-wrap { width: 160px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .prog-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.5s ease; }

  .sec-title { font-size: 0.62rem; font-weight: 700; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 7px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .cbadge { background: var(--accent-light); color: var(--accent); font-family: var(--mono); font-size: 0.58rem; padding: 1px 6px; border-radius: 10px; }

  .ep-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 11px 12px; margin-bottom: 9px; }
  .ep-card:hover { border-color: #c8c6bf; }
  .ep-line { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap; }
  .method { font-family: var(--mono); font-size: 0.58rem; font-weight: 500; padding: 2px 7px; border-radius: 4px; flex-shrink: 0; }
  .GET    { background:#eff6ff; color:#1d4ed8; }
  .POST   { background:#f0fdf4; color:#15803d; }
  .PUT    { background:#fffbeb; color:#b45309; }
  .PATCH  { background:#fff7ed; color:#c2410c; }
  .DELETE { background:#fef2f2; color:#b91c1c; }
  .ep-path { font-family: var(--mono); font-size: 0.72rem; word-break: break-all; }
  .ep-desc { font-size: 0.72rem; color: var(--text2); margin: 4px 0 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; }
  .chip { font-family: var(--mono); font-size: 0.58rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px; color: var(--text2); }
  .chip b { color: var(--text); font-weight: 500; }

  .rule { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.75rem; }
  .rule:last-child { border-bottom: none; }
  .rdot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 7px; }

  .flag { background: var(--warn-bg); border: 1px solid var(--warn-border); border-radius: var(--radius-sm); padding: 9px 12px; margin-bottom: 8px; font-size: 0.75rem; color: var(--warn-text); line-height: 1.5; }

  pre { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: var(--mono); font-size: 0.67rem; line-height: 1.68; overflow-x: auto; white-space: pre; color: var(--text); }
  .copy-btn { margin-left: auto; font-size: 0.6rem; padding: 2px 9px; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); cursor: pointer; color: var(--text2); font-family: var(--sans); font-weight: 600; }
  .copy-btn:hover { color: var(--text); }

  .err { background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: var(--radius-sm); padding: 14px; color: var(--danger-text); font-size: 0.75rem; line-height: 1.7; }
  .err code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 0.7rem; }
  .ok-note { background: var(--success-bg); border: 1px solid #bbf7d0; border-radius: var(--radius-sm); padding: 10px 12px; color: var(--success-text); font-size: 0.75rem; }

  @media (max-width: 800px) { main { grid-template-columns: 1fr; padding: 12px 16px; } header { padding: 0 16px; } }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <div class="logo">M</div>
    <div>
      <div class="logo-text">Meridian</div>
      <div class="logo-sub">API Design Intelligence</div>
    </div>
  </div>
  <div class="hdivider"></div>
  <div class="status-dot" id="sDot"></div>
  <span class="status-label" id="sLabel">Connecting...</span>
  <div class="spacer"></div>
  <span class="badge">POWERED BY CLAUDE</span>
</header>

<main>
  <div class="panel">
    <div class="panel-head">
      <h2>Meeting Transcript</h2>
      <span class="cnt" id="cc">0 chars</span>
    </div>
    <textarea id="ta" placeholder="Paste your meeting transcript here...

Example:
PM: We need an endpoint to fetch all orders for a customer.
Dev: Should we filter by status?
PM: Yes — pending, shipped, delivered. Also by date range.
Dev: Validation rules for creating orders?
PM: At least one item per order. Total must be above $10.
     Max 5 orders per customer per day.
Dev: What if a product is out of stock at order time?
PM: Reject the order — no backorders.
Dev: What about cancellations?
PM: Only allowed in pending or confirmed state."></textarea>
    <div class="action-bar">
      <button class="btn" onclick="clearAll()">Clear</button>
      <span class="hint" id="hint"></span>
      <button class="btn primary" id="abtn" onclick="analyze()">Analyze transcript →</button>
    </div>
  </div>

  <div class="panel">
    <div class="tabs">
      <button class="tab on" onclick="sw('ep',this)">Endpoints</button>
      <button class="tab" onclick="sw('bl',this)">Business Logic</button>
      <button class="tab" onclick="sw('am',this)">Ambiguities</button>
      <button class="tab" onclick="sw('oa',this)">OpenAPI YAML</button>
    </div>
    <div class="out on" id="out-ep"><div class="empty"><div class="icon">🔌</div><p>Paste a transcript and click<br><strong>Analyze transcript</strong></p></div></div>
    <div class="out" id="out-bl"><div class="empty"><div class="icon">⚙️</div><p>Business rules will appear here</p></div></div>
    <div class="out" id="out-am"><div class="empty"><div class="icon">⚠️</div><p>Ambiguities will appear here</p></div></div>
    <div class="out" id="out-oa"><div class="empty"><div class="icon">📄</div><p>OpenAPI YAML will appear here</p></div></div>
  </div>
</main>

<script>
  // ─────────────────────────────────────────────────────────────
  // STEP 1: After deploying your Cloudflare Worker, paste its URL here
  // Example: 'https://meridian-proxy.yourname.workers.dev'
  // ─────────────────────────────────────────────────────────────
  const WORKER_URL = 'https://api-analyzer-proxy.rahulchadha79.workers.dev/';

  // Health check
  async function checkHealth() {
    try {
      const r = await fetch(`${WORKER_URL}/health`);
      if (r.ok) {
        document.getElementById('sDot').style.background = '#22c55e';
        document.getElementById('sLabel').textContent = 'Backend connected';
      } else throw new Error();
    } catch {
      document.getElementById('sDot').style.background = '#ef4444';
      document.getElementById('sLabel').textContent = 'Worker not connected — see README';
    }
  }
  checkHealth();

  const ta = document.getElementById('ta');
  ta.addEventListener('input', () => {
    const l = ta.value.length;
    document.getElementById('cc').textContent = l.toLocaleString() + ' chars';
    document.getElementById('hint').textContent = l > 200 ? '✓ Good length' : l > 0 ? 'Add more detail' : '';
  });

  function sw(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.out').forEach(o => o.classList.remove('on'));
    el.classList.add('on');
    document.getElementById('out-' + id).classList.add('on');
  }

  function clearAll() {
    ta.value = '';
    document.getElementById('cc').textContent = '0 chars';
    document.getElementById('hint').textContent = '';
    setEmpty();
  }

  function setEmpty() {
    document.getElementById('out-ep').innerHTML = '<div class="empty"><div class="icon">🔌</div><p>Paste a transcript and click<br><strong>Analyze transcript</strong></p></div>';
    document.getElementById('out-bl').innerHTML = '<div class="empty"><div class="icon">⚙️</div><p>Business rules will appear here</p></div>';
    document.getElementById('out-am').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Ambiguities will appear here</p></div>';
    document.getElementById('out-oa').innerHTML = '<div class="empty"><div class="icon">📄</div><p>OpenAPI YAML will appear here</p></div>';
  }

  function setLoading(msg, pct) {
    const html = `<div class="spin-wrap"><div class="spin"></div><p class="prog-label">${msg}</p><div class="prog-bar-wrap"><div class="prog-bar" style="width:${pct}%"></div></div></div>`;
    ['ep','bl','am','oa'].forEach(k => { document.getElementById('out-' + k).innerHTML = html; });
  }

  function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function renderEp(data) {
    const el = document.getElementById('out-ep');
    const eps = data.endpoints || [];
    if (!eps.length) { el.innerHTML = '<div class="empty"><p>No endpoints found</p></div>'; return; }
    let h = `<div class="sec-title">Endpoints <span class="cbadge">${eps.length}</span></div>`;
    eps.forEach(e => {
      const m = (e.method||'GET').toUpperCase();
      const ps = (e.parameters||[]).map(p=>`<span class="chip"><b>${esc(p.name)}</b>: ${esc(p.type)} [${esc(p.in)}]</span>`).join('');
      h += `<div class="ep-card"><div class="ep-line"><span class="method ${m}">${m}</span><span class="ep-path">${esc(e.path)}</span></div><div class="ep-desc">${esc(e.description||'')}</div>${ps?`<div class="chips">${ps}</div>`:''}</div>`;
    });
    el.innerHTML = h;
  }

  function renderBl(data) {
    const el = document.getElementById('out-bl');
    const rules = data.businessRules || [];
    if (!rules.length) { el.innerHTML = '<div class="empty"><p>No business rules detected</p></div>'; return; }
    let h = `<div class="sec-title">Business Rules <span class="cbadge">${rules.length}</span></div>`;
    rules.forEach(r => { h += `<div class="rule"><div class="rdot"></div><div>${esc(r)}</div></div>`; });
    el.innerHTML = h;
  }

  function renderAm(data) {
    const el = document.getElementById('out-am');
    const flags = data.ambiguities || [];
    if (!flags.length) { el.innerHTML = `<div class="ok-note">&#10003; No major ambiguities detected.</div>`; return; }
    let h = `<div class="sec-title">Needs Follow-up <span class="cbadge">${flags.length}</span></div>`;
    flags.forEach(f => { h += `<div class="flag">${esc(f)}</div>`; });
    el.innerHTML = h;
  }

  function renderOa(yaml) {
    const el = document.getElementById('out-oa');
    if (!yaml||!yaml.trim()) { el.innerHTML = '<div class="empty"><p>YAML not generated</p></div>'; return; }
    el.innerHTML = `<div class="sec-title">OpenAPI 3.0 Specification <button class="copy-btn" id="cb" onclick="copyYaml()">Copy YAML</button></div><pre id="yb">${esc(yaml)}</pre>`;
  }

  function copyYaml() {
    navigator.clipboard.writeText(document.getElementById('yb').textContent).then(() => {
      const b = document.getElementById('cb'); b.textContent = 'Copied!';
      setTimeout(() => b.textContent = 'Copy YAML', 2000);
    });
  }

  async function analyze() {
    const txt = ta.value.trim();
    if (!txt) { ta.focus(); return; }
    if (txt.length < 30) { alert('Please paste a longer transcript.'); return; }

    const btn = document.getElementById('abtn');
    btn.disabled = true; btn.textContent = 'Analyzing...';
    setLoading('Extracting endpoints and business rules...', 40);

    try {
      const res = await fetch(`${WORKER_URL}/api/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ transcript: txt }),
      });
      if (!res.ok) {
        const e = await res.json().catch(() => ({}));
        throw new Error(e.error || `Server error ${res.status}`);
      }
      setLoading('Generating OpenAPI YAML...', 80);
      const data = await res.json();
      renderEp(data); renderBl(data); renderAm(data); renderOa(data.openApiYaml || '');
    } catch (err) {
      const msg = `<div class="err"><strong>Error:</strong> ${esc(err.message)}<br><br>
        &bull; Make sure <code>WORKER_URL</code> in <code>index.html</code> points to your Cloudflare Worker<br>
        &bull; Check that <code>ANTHROPIC_API_KEY</code> is set as a secret in your Worker settings
      </div>`;
      ['ep','bl','am','oa'].forEach(k => { document.getElementById('out-' + k).innerHTML = msg; });
    }
    btn.disabled = false; btn.textContent = 'Analyze transcript →';
  }
</script>
</body>
</html>
